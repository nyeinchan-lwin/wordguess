<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordGuess</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Language selection screen -->
  <div data-screen="menu">
    <header class="site-header">
      <h1 class="site-title">WordGuess</h1>
    </header>
    <main class="menu-main">
      <section class="how-to-play" aria-label="How to play">
        <p class="htp-rule">Guess the 5-letter word in 6 tries.</p>
        <ul class="htp-legend">
          <li><span class="htp-swatch htp-swatch--correct" aria-hidden="true"></span>Right letter, right spot</li>
          <li><span class="htp-swatch htp-swatch--present" aria-hidden="true"></span>Right letter, wrong spot</li>
          <li><span class="htp-swatch htp-swatch--absent"  aria-hidden="true"></span>Not in the word</li>
        </ul>
      </section>
      <div class="menu-buttons">
        <button class="btn btn-primary btn-lang" data-target="en">English</button>
      </div>
    </main>
  </div>

  <!-- English game screen -->
  <div data-screen="en" hidden>
    <header class="site-header">
      <button class="btn btn-ghost btn-back" data-back
              aria-label="Back to language selection">← Back</button>
      <h1 class="site-title">WordGuess</h1>
    </header>
    <main class="game-main">
      <div class="grid" role="grid" aria-label="Guesses" data-grid></div>
      <div class="keyboard" data-keyboard></div>
    </main>
    <div class="modal-overlay" data-modal hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="en-modal-msg">
        <p class="modal-message" id="en-modal-msg" data-modal-message></p>
        <p class="modal-word" data-modal-word hidden></p>
        <button class="btn btn-primary btn-play-again" data-modal-action>Play Again</button>
      </div>
    </div>
  </div>

  <!-- Brief visual toast messages -->
  <div class="toast" data-toast hidden></div>

  <!-- Screen-reader live region -->
  <div class="sr-only" aria-live="assertive" data-announce></div>

  <script src="script.js"></script>
</body>
</html>
