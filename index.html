<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordGuess</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Language selection screen -->
  <div data-screen="menu">
    <header class="site-header">
      <h1 class="site-title">WordGuess</h1>
    </header>
    <main class="menu-main">
      <section class="how-to-play" aria-label="How to play">
        <p class="htp-rule">Guess the 5-letter word in 6 tries.</p>
        <ul class="htp-legend">
          <li><span class="htp-swatch htp-swatch--correct" aria-hidden="true"></span>Right letter, right spot</li>
          <li><span class="htp-swatch htp-swatch--present" aria-hidden="true"></span>Right letter, wrong spot</li>
          <li><span class="htp-swatch htp-swatch--absent"  aria-hidden="true"></span>Not in the word</li>
        </ul>
      </section>
      <div class="menu-buttons">
        <button class="btn btn-primary btn-lang" data-target="en">English</button>
        <button class="btn btn-ghost btn-lang" data-stats-open>Stats</button>
      </div>
    </main>
  </div>

  <!-- English game screen -->
  <div data-screen="en" hidden>
    <header class="site-header">
      <button class="btn btn-ghost btn-back" data-back
              aria-label="Back to language selection">← Back</button>
      <h1 class="site-title">WordGuess</h1>
    </header>
    <main class="game-main">
      <div class="grid" role="grid" aria-label="Guesses" data-grid></div>
      <div class="keyboard" data-keyboard role="group" aria-label="On-screen keyboard"></div>
    </main>
    <div class="modal-overlay" data-modal hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="en-modal-msg">
        <p class="modal-message" id="en-modal-msg" data-modal-message></p>
        <p class="modal-word" data-modal-word hidden></p>
        <div class="stats-row" data-modal-stats>
          <div class="stat-box">
            <span class="stat-num" data-stat="played">0</span>
            <span class="stat-label">Played</span>
          </div>
          <div class="stat-box">
            <span class="stat-num" data-stat="win-pct">0</span>
            <span class="stat-label">Win %</span>
          </div>
          <div class="stat-box">
            <span class="stat-num" data-stat="streak">0</span>
            <span class="stat-label">Streak</span>
          </div>
          <div class="stat-box">
            <span class="stat-num" data-stat="best">0</span>
            <span class="stat-label">Best</span>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-primary btn-play-again" data-modal-action>Play Again</button>
          <button class="btn btn-ghost btn-share" data-modal-share>Share result</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Statistics overlay (accessible from menu and game modal) -->
  <div class="modal-overlay" data-stats-overlay hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="stats-title">
      <p class="modal-message" id="stats-title">Statistics</p>
      <div class="stats-row">
        <div class="stat-box">
          <span class="stat-num" data-stat="played">0</span>
          <span class="stat-label">Played</span>
        </div>
        <div class="stat-box">
          <span class="stat-num" data-stat="win-pct">0</span>
          <span class="stat-label">Win %</span>
        </div>
        <div class="stat-box">
          <span class="stat-num" data-stat="streak">0</span>
          <span class="stat-label">Streak</span>
        </div>
        <div class="stat-box">
          <span class="stat-num" data-stat="best">0</span>
          <span class="stat-label">Best</span>
        </div>
      </div>
      <button class="btn btn-ghost" data-stats-close>Close</button>
    </div>
  </div>

  <!-- Brief visual toast messages -->
  <div class="toast" data-toast hidden></div>

  <!-- Screen-reader live region -->
  <div class="sr-only" aria-live="assertive" data-announce></div>

  <script src="script.js"></script>
</body>
</html>
